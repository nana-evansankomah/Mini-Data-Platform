name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check airflow/ scripts/ tests/

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r airflow/requirements.txt pytest
      - run: pytest tests/unit/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build --no-cache

  integration-test:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose up -d
      - name: Wait for services
        run: sleep 60
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r airflow/requirements.txt pytest requests
      - run: pytest tests/integration/ -v --tb=short -m integration
      - if: failure()
        run: docker compose logs > /tmp/compose-logs.txt
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: /tmp/compose-logs.txt
      - run: docker compose down -v

  data-flow-validation:
    runs-on: ubuntu-latest
    needs: integration-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r airflow/requirements.txt requests
      - run: cp .env.example .env
      - run: docker compose up -d
      - name: Wait for services
        run: sleep 90
      - name: Generate and upload test data
        run: |
          python scripts/generate_sample_data.py --rows 20 --output /tmp/test_sales.csv
          python scripts/upload_to_minio.py --file /tmp/test_sales.csv
      - name: Trigger and wait for DAG
        run: |
          python -c "
          import os
          import time
          import requests

          airflow_url = os.getenv('AIRFLOW_URL', 'http://localhost:8080')
          auth = (os.getenv('AIRFLOW_USER', 'admin'), os.getenv('AIRFLOW_PASS', 'changeme'))
          dag_id = 'sales_etl'

          for _ in range(30):
              try:
                  health = requests.get(f'{airflow_url}/health', timeout=10)
                  if health.ok:
                      break
              except requests.RequestException:
                  pass
              time.sleep(5)
          else:
              raise RuntimeError('Airflow did not become healthy in time')

          trigger = requests.post(
              f'{airflow_url}/api/v1/dags/{dag_id}/dagRuns',
              auth=auth,
              json={'conf': {}},
              timeout=30,
          )
          trigger.raise_for_status()
          run_id = trigger.json()['dag_run_id']
          print(f'Triggered DAG run: {run_id}')

          deadline = time.time() + 600
          while time.time() < deadline:
              status = requests.get(
                  f'{airflow_url}/api/v1/dags/{dag_id}/dagRuns/{run_id}',
                  auth=auth,
                  timeout=30,
              )
              status.raise_for_status()
              state = status.json()['state']
              print(f'DAG state: {state}')
              if state == 'success':
                  break
              if state == 'failed':
                  raise RuntimeError(f'DAG run failed with state: {state}')
              time.sleep(10)
          else:
              raise TimeoutError('DAG run did not complete within 10 minutes')
          "
      - name: Validate data flow
        run: |
          python -c "
          import psycopg2
          conn = psycopg2.connect('postgresql://etl_writer:changeme@localhost:5432/dataplatform')
          cur = conn.cursor()
          cur.execute('SELECT COUNT(*) FROM curated.fact_orders')
          count = cur.fetchone()[0]
          assert count >= 20, f'Expected >=20 rows, got {count}'
          cur.execute(\"SELECT COUNT(*) FROM audit.etl_audit_runs WHERE status = 'SUCCESS'\")
          audits = cur.fetchone()[0]
          assert audits >= 1, f'Expected >=1 successful audit run, got {audits}'
          cur.execute('SELECT COUNT(*) FROM curated.summary_daily_sales')
          summaries = cur.fetchone()[0]
          assert summaries >= 1, f'Expected >=1 summary row, got {summaries}'
          print(f'Data flow validated: {count} orders, {audits} audit runs, {summaries} summary rows')
          conn.close()
          "
      - run: docker compose down -v
