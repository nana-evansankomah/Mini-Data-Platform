name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check airflow/ scripts/ tests/

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r airflow/requirements.txt pytest
      - run: pytest tests/unit/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build --no-cache

  integration-test:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose up -d
      - name: Wait for services
        run: sleep 60
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest requests minio psycopg2-binary
      - run: pytest tests/integration/ -v --tb=short -m integration
      - if: failure()
        run: docker compose logs > /tmp/compose-logs.txt
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: /tmp/compose-logs.txt
      - run: docker compose down -v

  data-flow-validation:
    runs-on: ubuntu-latest
    needs: integration-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install minio psycopg2-binary
      - run: cp .env.example .env
      - run: docker compose up -d
      - name: Wait for services
        run: sleep 90
      - name: Generate and upload test data
        run: |
          python scripts/generate_sample_data.py --rows 20 --output /tmp/test_sales.csv
          python scripts/upload_to_minio.py --file /tmp/test_sales.csv
      - name: Wait for DAG to process
        run: sleep 120
      - name: Validate data flow
        run: |
          python -c "
          import psycopg2
          conn = psycopg2.connect('postgresql://etl_writer:changeme@localhost:5432/dataplatform')
          cur = conn.cursor()
          cur.execute('SELECT COUNT(*) FROM curated.fact_orders')
          count = cur.fetchone()[0]
          assert count >= 20, f'Expected >=20 rows, got {count}'
          cur.execute(\"SELECT COUNT(*) FROM audit.etl_audit_runs WHERE status = 'SUCCESS'\")
          audits = cur.fetchone()[0]
          assert audits >= 1, f'Expected >=1 successful audit run, got {audits}'
          cur.execute('SELECT COUNT(*) FROM curated.summary_daily_sales')
          summaries = cur.fetchone()[0]
          assert summaries >= 1, f'Expected >=1 summary row, got {summaries}'
          print(f'Data flow validated: {count} orders, {audits} audit runs, {summaries} summary rows')
          conn.close()
          "
      - run: docker compose down -v
