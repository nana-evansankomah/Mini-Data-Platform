name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Create .env from secrets
        run: |
          echo "POSTGRES_DB=dataplatform"                                     > .env
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER || 'admin' }}"                  >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD || 'password123' }}"       >> .env
          echo "ETL_WRITER_PASSWORD=${{ secrets.ETL_WRITER_PASSWORD || 'password123' }}"   >> .env
          echo "BI_READER_PASSWORD=${{ secrets.BI_READER_PASSWORD || 'password123' }}"     >> .env
          echo "MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER || 'minioadmin' }}"             >> .env
          echo "MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD || 'password123' }}"   >> .env
          echo "AIRFLOW__CORE__FERNET_KEY=${{ secrets.FERNET_KEY || 'your-fernet-key-here' }}"        >> .env
          echo "AIRFLOW__WEBSERVER__SECRET_KEY=${{ secrets.WEBSERVER_SECRET || 'your-secret-key-here' }}" >> .env
          echo "AIRFLOW_ADMIN_PASSWORD=${{ secrets.AIRFLOW_ADMIN_PASSWORD || 'password123' }}" >> .env

      - name: Deploy containers
        run: |
          docker compose pull
          docker compose up -d --build --remove-orphans
          docker compose ps

      - name: Health check
        run: |
          for i in {1..24}; do
            airflow_ok=0
            minio_ok=0
            metabase_ok=0
            curl -fsS http://localhost:8080/health >/dev/null && airflow_ok=1 || true
            curl -fsS http://localhost:9000/minio/health/live >/dev/null && minio_ok=1 || true
            curl -fsS http://localhost:3000/api/health >/dev/null && metabase_ok=1 || true
            if [[ "$airflow_ok" -eq 1 && "$minio_ok" -eq 1 && "$metabase_ok" -eq 1 ]]; then
              break
            fi
            sleep 10
          done
          curl -f http://localhost:8080/health || exit 1
          curl -f http://localhost:9000/minio/health/live || exit 1
          curl -f http://localhost:3000/api/health || exit 1
          echo "All services healthy"

      - name: Teardown
        if: always()
        run: docker compose down -v
